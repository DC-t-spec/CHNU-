<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CHNU</title>

  <link rel="stylesheet" href="./assets/css/tokens.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/modules/documents.css" />
  <link rel="stylesheet" href="./assets/css/modules/inventory.css" />
  <link rel="stylesheet" href="./assets/css/modules/products.css" />
  <link rel="stylesheet" href="./assets/css/modules/reports.css" />
  <link rel="stylesheet" href="./assets/css/modules/dashboard.css" />
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <h1>CHNU</h1>
        <p>ERP Suite</p>
      </div>

      <nav class="sidebar__nav" aria-label="Primary navigation">
        <div class="sidebar__section">
          <a href="#dashboard" class="sidebar__link" data-nav-group="dashboard">
            <span class="sidebar__link-label">Dashboard</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Operations</p>

          <a href="#documents" class="sidebar__link" data-nav-group="operations">
            <span class="sidebar__link-label">Documents</span>
          </a>
          <a href="#sales" class="sidebar__link" data-nav-group="operations">
            <span class="sidebar__link-label">Sales</span>
          </a>
          <a href="#purchases" class="sidebar__link" data-nav-group="operations">
            <span class="sidebar__link-label">Purchases</span>
          </a>
          <a href="#inventory-balances" class="sidebar__link" data-nav-group="operations">
            <span class="sidebar__link-label">Inventory Balances</span>
          </a>
          <a href="#inventory-ledger" class="sidebar__link" data-nav-group="operations">
            <span class="sidebar__link-label">Inventory Ledger</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Catalog</p>

          <a href="#products" class="sidebar__link" data-nav-group="catalog">
            <span class="sidebar__link-label">Products</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Analytics</p>

          <a href="#reports" class="sidebar__link" data-nav-group="analytics">
            <span class="sidebar__link-label">Reports Dashboard</span>
          </a>
          <a href="#reports-stock" class="sidebar__link" data-nav-group="analytics">
            <span class="sidebar__link-label">Stock Report</span>
          </a>
          <a href="#reports-movements" class="sidebar__link" data-nav-group="analytics">
            <span class="sidebar__link-label">Movement Report</span>
          </a>
        </div>

        <div class="sidebar__section sidebar__section--future" aria-hidden="true">
          <p class="sidebar__section-title">Settings</p>
          <span class="sidebar__section-placeholder">Coming soon</span>
        </div>
      </nav>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div class="topbar__title">
          <span>Sistema ERP/Admin</span>
        </div>
      </header>

      <main class="main-content">
        <div id="app"></div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
